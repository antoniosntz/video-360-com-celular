<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teleport 360 - Edição Meta Quest</title>
    <style>
        /* Reset de Estilos Mobile */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            background-color: #121212;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .screen {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .screen.active {
            display: block;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
        }

        .painel-topo {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 25px;
            text-align: center;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.1);
            width: 90%;
            max-width: 400px;
        }

        .painel-topo h2 { font-size: 22px; margin-bottom: 5px; color: #00ffcc; }
        .painel-topo p { font-size: 13px; color: #ddd; }

        /* Timer na Tela */
        #timer-display {
            font-size: 18px;
            font-weight: bold;
            color: #ffcc00;
            margin-top: 5px;
            display: none;
        }

        /* Retículo da Mira Central */
        .mira-central {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            border: 3px solid #ff0055;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
        }
        
        .mira-central.alinhada {
            border-color: #ffcc00; 
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }

        .mira-central.capturando {
            border-color: #00ffcc; 
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.8);
            transform: translate(-50%, -50%) scale(1.1);
            transition: transform 0.1s;
        }

        .mira-central::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: currentColor;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* Espaço de Renderização das bolinhas */
        #espaco-pontos {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 6;
        }

        .bolinha-guia {
            position: absolute;
            width: 30px;
            height: 30px;
            background: rgba(255, 0, 85, 0.6);
            border: 3px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .bolinha-guia.capturada {
            background: #00ffcc !important;
            transform: translate(-50%, -50%) scale(0.7);
            opacity: 0.4;
        }

        #btn-permissao {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 18px 36px;
            background: #ffffff;
            color: #000;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Tela de Exportação */
        #tela-exportacao {
            background: #1a1a1a;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
        }

        #tela-exportacao.active { display: flex; }

        .preview-canvas {
            max-width: 90%;
            max-height: 40vh;
            border: 2px solid #333;
            margin: 20px 0;
            background: #000;
        }

        .btn-salvar {
            background: #00ffcc;
            color: #000;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,255,204,0.3);
        }
    </style>
</head>
<body>

    <div id="tela-captura" class="screen active">
        <video id="webcam" autoplay playsinline muted></video>
        <div class="mira-central" id="mira"></div>
        <div id="espaco-pontos"></div>

        <div class="hud">
            <div class="painel-topo">
                <h2 id="contador">Progresso: 0%</h2>
                <p id="instrucao">Clique no botão para calibrar a bússola</p>
                <div id="timer-display">Segure firme: 1.5s</div>
                <p id="debug" style="font-size: 11px; color: #888; margin-top: 5px; font-family: monospace;">Aguardando...</p>
            </div>
            <button id="btn-permissao" onclick="inicializarApp()">Iniciar Captura</button>
        </div>
    </div>

    <div id="tela-exportacao" class="screen">
        <h2>Captura Concluída!</h2>
        <p style="color: #aaa; margin-top: 10px;">Abaixo está o mapa de texturas esféricas gerado para os seus óculos VR.</p>
        <canvas id="canvas-final" class="preview-canvas"></canvas>
        <button class="btn-salvar" onclick="baixarArquivoQuest()">Salvar Arquivo para Meta Quest</button>
    </div>

    <script>
        const espacoPontos = document.getElementById('espaco-pontos');
        const contadorTxt = document.getElementById('contador');
        const instrucaoTxt = document.getElementById('instrucao');
        const timerDisplay = document.getElementById('timer-display');
        const debugTxt = document.getElementById('debug');
        const btnPermissao = document.getElementById('btn-permissao');
        const mira = document.getElementById('mira');
        const video = document.getElementById('webcam');
        const canvasFinal = document.getElementById('canvas-final');

        let fotosCapturadas = 0;
        let listaPontos = [];
        let fotosMemoria = [];

        // Controle de Tempo/Estabilização
        let pontoSendoFocado = null;
        let timerFoco = null;
        const TEMPO_ESPERA = 1500; 

        // Configuração: Teto, Linha do Horizonte e Chão
        const configuracaoCamadas = [
            { tipo: 'teto', inclina: 45, quantidade: 6 },
            { tipo: 'horizonte', inclina: 90, quantidade: 10 },
            { tipo: 'chao', inclina: 135, quantidade: 6 }
        ];
        
        let totalFotosEsperadas = 22;

        function gerarGradePontos() {
            espacoPontos.innerHTML = '';
            listaPontos = [];
            
            configuracaoCamadas.forEach(camada => {
                for (let i = 0; i < camada.quantidade; i++) {
                    let anguloBussolaAlvo = (360 / camada.quantidade) * i;
                    
                    const div = document.createElement('div');
                    div.className = 'bolinha-guia';
                    espacoPontos.appendChild(div);

                    listaPontos.push({
                        id: listaPontos.length,
                        alvoYaw: anguloBussolaAlvo, 
                        alvoPitch: camada.inclina,
                        tipo: camada.tipo,
                        capturado: false,
                        element: div
                    });
                }
            });
        }

        async function iniciarCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Permita o acesso à câmera.");
            }
        }

        function inicializarApp() {
            instrucaoTxt.innerText = "Alinhe e segure firme na bolinha";
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(response => {
                    if (response === 'granted') {
                        window.addEventListener('deviceorientation', processarMovimento, true);
                        btnPermissao.style.display = 'none';
                    }
                });
            } else {
                window.addEventListener('deviceorientationabsolute', processarMovimento, true);
                btnPermissao.style.display = 'none';
            }
            iniciarCamera();
            gerarGradePontos();
        }

        function processarMovimento(event) {
            let grauBussola = event.webkitCompassHeading !== undefined ? event.webkitCompassHeading : (360 - event.alpha); 
            let beta = event.beta;

            if (grauBussola === undefined || beta === null) return;
            if (grauBussola >= 360) grauBussola -= 360;

            debugTxt.innerText = `BÚSSOLA: ${Math.round(grauBussola)}° | INCLINAÇÃO: ${Math.round(beta)}°`;

            const larguraTela = window.innerWidth;
            const alturaTela = window.innerHeight;
            const sensibilidadeX = larguraTela / 50; 
            const sensibilidadeY = alturaTela / 50; 

            let algumAlvoAlinhado = false;
            let pontoAlinhadoAtual = null;

            listaPontos.forEach(ponto => {
                if (ponto.capturado) return;

                let diffX = ponto.alvoYaw - grauBussola;
                
                // Correção aplicada: 'beta - ponto.alvoPitch' resolve a inversão teto/chão
                let diffY = beta - ponto.alvoPitch;

                if (diffX > 180) diffX -= 360;
                if (diffX < -180) diffX += 360;

                let posX = (larguraTela / 2) + (diffX * sensibilidadeX);
                let posY = (alturaTela / 2) + (diffY * sensibilidadeY);

                if (posX > -30 && posX < larguraTela + 30 && posY > -30 && posY < alturaTela + 30) {
                    ponto.element.style.display = 'block';
                    ponto.element.style.left = `${posX}px`;
                    ponto.element.style.top = `${posY}px`;
                } else {
                    ponto.element.style.display = 'none';
                }

                let distDaMira = Math.sqrt(Math.pow(posX - (larguraTela/2), 2) + Math.pow(posY - (alturaTela/2), 2));

                if (distDaMira < 22) {
                    algumAlvoAlinhado = true;
                    pontoAlinhadoAtual = ponto;
                }
            });

            // Timer de Estabilização de 1.5s
            if (algumAlvoAlinhado && pontoAlinhadoAtual) {
                if (pontoSendoFocado !== pontoAlinhadoAtual.id) {
                    resetarTimerFoco();
                    pontoSendoFocado = pontoAlinhadoAtual.id;
                    
                    mira.className = "mira-central alinhada";
                    timerDisplay.style.display = "block";
                    timerDisplay.innerText = "Segure firme: 1.5s";

                    let tempoRestante = 1.5;
                    timerFoco = setInterval(() => {
                        tempoRestante -= 0.5;
                        if (tempoRestante > 0) {
                            timerDisplay.innerText = `Segure firme: ${tempoRestante.toFixed(1)}s`;
                        } else {
                            executarCapturaDeFoto(pontoAlinhadoAtual);
                        }
                    }, 500);
                }
            } else {
                resetarTimerFoco();
            }
        }

        function resetarTimerFoco() {
            if (timerFoco) {
                clearInterval(timerFoco);
                timerFoco = null;
            }
            pontoSendoFocado = null;
            mira.className = "mira-central";
            timerDisplay.style.display = "none";
        }

        function ejecutarCapturaDeFoto(ponto) {
            resetarTimerFoco();
            
            ponto.capturado = true;
            ponto.element.classList.add('capturada');
            
            mira.classList.add('capturando');
            setTimeout(() => mira.classList.remove('capturando'), 200);

            salvarFrameNaMemoria();
            fotosCapturadas++;
            
            let porcentagem = Math.round((fotosCapturadas / totalFotosEsperadas) * 100);
            contadorTxt.innerText = `Progresso: ${porcentagem}%`;

            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

            if (fotosCapturadas === totalFotosEsperadas) {
                finalizarECaptonarAmbiente();
            }
        }

        function salvarFrameNaMemoria() {
            const canvasOculto = document.createElement('canvas');
            canvasOculto.width = 640;
            canvasOculto.height = 480;
            const ctx = canvasOculto.getContext('2d');
            ctx.drawImage(video, 0, 0, canvasOculto.width, canvasOculto.height);
            fotosMemoria.push(canvasOculto);
        }

        function finalizarECaptonarAmbiente() {
            window.removeEventListener('deviceorientation', processarMovimento);
            window.removeEventListener('deviceorientationabsolute', processarMovimento);
            
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            document.getElementById('tela-captura').classList.remove('active');
            document.getElementById('tela-exportacao').classList.add('active');

            renderizarTexturaFinal();
        }

        function renderizarTexturaFinal() {
            const ctx = canvasFinal.getContext('2d');
            canvasFinal.width = 2048;
            canvasFinal.height = 1536;

            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvasFinal.width, canvasFinal.height);

            let colunas = 6;
            let larguraSlot = canvasFinal.width / colunas;
            let alturaSlot = canvasFinal.height / 4;

            fotosMemoria.forEach((img, index) => {
                let x = (index % colunas) * larguraSlot;
                let y = Math.floor(index / colunas) * alturaSlot;
                ctx.drawImage(img, x, y, larguraSlot, alturaSlot);
            });
        }

        function baixarArquivoQuest() {
            const link = document.createElement('a');
            link.download = 'panorama_esferico_meta_quest.jpg';
            link.href = canvasFinal.toDataURL('image/jpeg', 0.9);
            link.click();
        }
    </script>
</body>
</html>
