<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teleport 360 - Correção de Teto</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            background-color: #121212;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .screen {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .screen.active {
            display: block;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #gatilho-toque {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 8;
            pointer-events: auto;
            display: none;
        }

        #gatilho-toque.ativo {
            display: block;
        }

        .hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px;
            z-index: 10;
        }

        .painel-topo {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            width: 90%;
            max-width: 400px;
        }

        .painel-topo h2 { font-size: 20px; margin-bottom: 3px; color: #00ffcc; }
        .painel-topo p { font-size: 13px; color: #ddd; }

        #timer-display {
            font-size: 16px;
            font-weight: bold;
            color: #ffcc00;
            margin-top: 3px;
        }

        .mira-central {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 70px;
            height: 70px;
            border: 3px dashed rgba(255, 0, 85, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            transition: transform 0.1s, border-color 0.2s;
        }
        
        .mira-central.alinhada {
            border: 4px solid #ffcc00;
            transform: translate(-50%, -50%) scale(0.95);
        }

        .mira-central.capturando {
            border-color: #00ffcc; 
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.9);
            transform: translate(-50%, -50%) scale(1.1);
        }

        .mira-central::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: currentColor;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        #espaco-pontos {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 6;
        }

        .bolinha-guia {
            position: absolute;
            width: 44px;
            height: 44px;
            background: rgba(0, 255, 204, 0.85);
            border: 3px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            will-change: left, top;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            color: #000;
        }

        .bolinha-guia.ponto-inicial {
            background: rgba(255, 204, 0, 0.95) !important;
            width: 50px;
            height: 50px;
            z-index: 99;
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.8);
        }

        #btn-permissao {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 18px 36px;
            background: #00ffcc;
            color: #000;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            z-index: 20;
            box-shadow: 0 10px 30px rgba(0,255,204,0.4);
        }

        #tela-exportacao {
            background: #1a1a1a;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
        }

        #tela-exportacao.active { display: flex; }

        .preview-canvas {
            max-width: 95%;
            max-height: 45vh;
            border: 2px solid #333;
            margin: 20px 0;
            background: #000;
        }

        .btn-salvar {
            background: #00ffcc;
            color: #000;
            padding: 16px 45px;
            font-size: 18px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="tela-captura" class="screen active">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="gatilho-toque" onclick="dispararCliqueManual()"></div>
        <div class="mira-central" id="mira"></div>
        <div id="espaco-pontos"></div>

        <div class="hud">
            <div class="painel-topo">
                <h2 id="contador">Progresso: 0%</h2>
                <p id="instrucao">Aguardando ativação...</p>
                <div id="timer-display">Calibrando Sensores...</div>
                <p id="debug" style="font-size: 11px; color: #00ffcc; margin-top: 5px; font-family: monospace;">Aguardando Inicialização...</p>
            </div>
            <button id="btn-permissao" onclick="inicializarApp()">ATIVAR CÂMERA E BÚSSOLA</button>
        </div>
    </div>

    <div id="tela-exportacao" class="screen">
        <h2>Mapeamento Concluído!</h2>
        <p style="color: #aaa; margin-top: 10px;">A imagem panorama foi gerada na ordem correta.</p>
        <canvas id="canvas-final" class="preview-canvas"></canvas>
        <button class="btn-salvar" onclick="baixarArquivoQuest()">Salvar Arquivo .JPG</button>
    </div>

    <script>
        const espacoPontos = document.getElementById('espaco-pontos');
        const contadorTxt = document.getElementById('contador');
        const instrucaoTxt = document.getElementById('instrucao');
        const timerDisplay = document.getElementById('timer-display');
        const debugTxt = document.getElementById('debug');
        const btnPermissao = document.getElementById('btn-permissao');
        const mira = document.getElementById('mira');
        const video = document.getElementById('webcam');
        const canvasFinal = document.getElementById('canvas-final');
        const gatilhoToque = document.getElementById('gatilho-toque');

        let fotosCapturadas = 0;
        let listaPontos = [];
        let fotosMemoria = [];
        let pontoAlinhadoGlobal = null;

        let smoothedYaw = 0;
        let smoothedPitch = 0;
        let primeiroFrameValido = true;
        
        let bussolaAncoraInicial = null;

        // Suavizámos o ângulo das camadas verticais para exigir menos inclinação física extrema (-30° e 30°)
        const configuracaoCamadas = [
            { tipo: 'teto', inclina: -30, quantidade: 6 },
            { tipo: 'horizonte', inclina: 0, quantidade: 10 },
            { tipo: 'chao', inclina: 30, quantidade: 6 }
        ];
        const totalFotosEsperadas = 22;

        function gerarGradePontos(offsetYaw) {
            espacoPontos.innerHTML = '';
            listaPontos = [];
            
            configuracaoCamadas.forEach(camada => {
                for (let i = 0; i < camada.quantidade; i++) {
                    let anguloBussolaAlvo = (360 / camada.quantidade) * i + offsetYaw;
                    anguloBussolaAlvo = (anguloBussolaAlvo % 360 + 360) % 360;

                    const div = document.createElement('div');
                    div.className = 'bolinha-guia';
                    
                    if (camada.tipo === 'horizonte' && i === 0) {
                        div.classList.add('ponto-inicial');
                        div.innerText = "1";
                    } else if (camada.tipo === 'teto') {
                        div.innerText = `↑`; // Desenha seta para cima nas bolinhas do teto
                    } else if (camada.tipo === 'chao') {
                        div.innerText = `↓`; // Desenha seta para baixo nas bolinhas do chão
                    }

                    espacoPontos.appendChild(div);

                    listaPontos.push({
                        id: listaPontos.length,
                        alvoY: anguloBussolaAlvo, 
                        alvoP: camada.inclina,
                        capturado: false,
                        element: div,
                        currentX: 0,
                        currentY: 0,
                        tipo: camada.tipo
                    });
                }
            });
        }

        async function iniciarCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Erro ao abrir câmera.");
            }
        }

        function inicializarApp() {
            instrucaoTxt.innerText = "Procure a bolinha 1 dourada para começar!";
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(response => {
                    if (response === 'granted') {
                        window.addEventListener('deviceorientation', lerSensoresFisicos, true);
                        btnPermissao.style.display = 'none';
                    }
                });
            } else {
                window.addEventListener('deviceorientationabsolute', lerSensoresFisicos, true);
                window.addEventListener('deviceorientation', lerSensoresFisicos, true);
                btnPermissao.style.display = 'none';
            }
            iniciarCamera();
        }

        let rawYaw = 0;
        let rawPitch = 0;

        function lerSensoresFisicos(event) {
            let grauBussola = event.webkitCompassHeading !== undefined ? event.webkitCompassHeading : (360 - event.alpha); 
            let pitchCelular = event.pitch !== undefined ? event.pitch : event.beta; 

            if (grauBussola === undefined || pitchCelular === null) return;

            grauBussola = (grauBussola % 360 + 360) % 360;

            if (event.gamma < 0 && pitchCelular > 0) pitchCelular = 180 - pitchCelular;
            if (event.gamma < 0 && pitchCelular < 0) pitchCelular = -180 - pitchCelular;
            
            let inclinacaoTratada = pitchCelular - 90;
            if (inclinacaoTratada > 180) inclinacaoTratada -= 360;

            // PROTEÇÃO ANTI-BLOQUEIO (Gimbal Lock)
            // Se o celular estiver muito inclinado para cima ou para baixo, trava a leitura da bússola bruta
            // para evitar que os pontos fiquem girando sozinhos em círculos no teto.
            if (Math.abs(inclinacaoTratada) > 25 && bussolaAncoraInicial !== null) {
                rawYaw = smoothedYaw; // Mantém o último yaw estável conhecido
            } else {
                rawYaw = grauBussola;
            }

            rawPitch = inclinacaoTratada;

            if (bussolaAncoraInicial === null) {
                bussolaAncoraInicial = rawYaw;
                gerarGradePontos(bussolaAncoraInicial);
                requestAnimationFrame(atualizarInterfaceSuave);
            }
        }

        function atualizarInterfaceSuave() {
            if (btnPermissao.style.display === 'none') {
                
                if (primeiroFrameValido) {
                    smoothedYaw = rawYaw;
                    smoothedPitch = rawPitch;
                    primeiroFrameValido = false;
                }

                let diffYaw = rawYaw - smoothedYaw;
                if (diffYaw > 180) smoothedYaw += 360;
                if (diffYaw < -180) smoothedYaw -= 360;

                smoothedYaw = smoothedYaw + (rawYaw - smoothedYaw) * 0.12;
                smoothedPitch = smoothedPitch + (rawPitch - smoothedPitch) * 0.12;

                debugTxt.innerText = `BÚSSOLA: ${Math.round(smoothedYaw % 360)}° | INCLINAÇÃO: ${Math.round(smoothedPitch)}°`;

                const larguraTela = window.innerWidth;
                const alturaTela = window.innerHeight;

                const fovGrausX = 65; 
                const fovGrausY = fovGrausX * (alturaTela / larguraTela);

                const pixelPorGrauX = larguraTela / fovGrausX;
                const pixelPorGrauY = alturaTela / fovGrausY;

                let pontoAlinhadoAtual = null;
                let menorDistancia = Infinity;

                // Auxiliares para saber se existem pontos daquela categoria ativos na tela
                let tetoVisivel = false;
                let chaoVisivel = false;

                listaPontos.forEach(ponto => {
                    if (ponto.capturado) return;

                    let targetDiffX = ponto.alvoY - smoothedYaw;
                    let targetDiffY = smoothedPitch - ponto.alvoP;

                    if (targetDiffX > 180) targetDiffX -= 360;
                    if (targetDiffX < -180) targetDiffX += 360;

                    let targetX = (larguraTela / 2) + (targetDiffX * pixelPorGrauX);
                    let targetY = (alturaTela / 2) + (targetDiffY * pixelPorGrauY);

                    ponto.currentX = ponto.currentX + (targetX - ponto.currentX) * 0.4;
                    ponto.currentY = ponto.currentY + (targetY - ponto.currentY) * 0.4;

                    if (ponto.currentX > -50 && ponto.currentX < larguraTela + 50 && ponto.currentY > -50 && ponto.currentY < alturaTela + 50) {
                        ponto.element.style.display = 'flex';
                        ponto.element.style.left = `${ponto.currentX}px`;
                        ponto.element.style.top = `${ponto.currentY}px`;
                        
                        if(ponto.tipo === 'teto') tetoVisivel = true;
                        if(ponto.tipo === 'chao') chaoVisivel = true;
                    } else {
                        ponto.element.style.display = 'none';
                    }

                    let distPixels = Math.sqrt(Math.pow(ponto.currentX - (larguraTela/2), 2) + Math.pow(ponto.currentY - (alturaTela/2), 2));

                    if (distPixels < 45 && distPixels < menorDistancia) {
                        menorDistancia = distPixels;
                        pontoAlinhadoAtual = ponto;
                    }
                });

                // ORIENTAÇÃO DINÂMICA DO HUD PARA O USUÁRIO
                if (pontoAlinhadoAtual) {
                    pontoAlinhadoGlobal = pontoAlinhadoAtual;
                    mira.className = "mira-central alinhada";
                    timerDisplay.innerText = "ALINHADO! TOQUE NA TELA";
                    gatilhoToque.classList.add('ativo');
                } else {
                    pontoAlinhadoGlobal = null;
                    mira.className = "mira-central";
                    gatilhoToque.classList.remove('ativo');
                    
                    // Alerta inteligente de direção baseado nas bolinhas ativas
                    if (tetoVisivel && smoothedPitch > -15) {
                        timerDisplay.innerText = "▲ OLHE MAIS PARA CIMA ▲";
                    } else if (chaoVisivel && smoothedPitch < 15) {
                        timerDisplay.innerText = "▼ OLHE MAIS PARA BAIXO ▼";
                    } else {
                        timerDisplay.innerText = "Enquadre uma bolinha";
                    }
                }
            }

            requestAnimationFrame(atualizarInterfaceSuave);
        }

        function dispararCliqueManual() {
            if (pontoAlinhadoGlobal) {
                let pontoParaCaptura = pontoAlinhadoGlobal;
                pontoAlinhadoGlobal = null; 
                executarCapturaDeFoto(pontoParaCaptura);
            }
        }

        function ejecutarCapturaDeFoto(ponto) {
            ponto.capturado = true;
            ponto.element.style.display = 'none';
            mira.className = "mira-central capturando";

            salvarFrameNaMemoria();
            fotosCapturadas++;
            
            let porcentagem = Math.round((fotosCapturadas / totalFotosEsperadas) * 100);
            contadorTxt.innerText = `Progresso: ${porcentagem}%`;

            if (ponto.id === 0) {
                 instrucaoTxt.innerText = "Gire para os lados para completar o horizonte!";
            } else if (fotosCapturadas >= 10 && fotosCapturadas < 16) {
                 instrucaoTxt.innerText = "Agora capture os pontos de CIMA (setas ▲)";
            } else if (fotosCapturadas >= 16) {
                 instrucaoTxt.innerText = "Por fim, capture os pontos de BAIXO (setas ▼)";
            }

            if (navigator.vibrate) navigator.vibrate(40);

            if (fotosCapturadas === totalFotosEsperadas) {
                finalizarECaptonarAmbiente();
            }
        }

        function salvarFrameNaMemoria() {
            const canvasOculto = document.createElement('canvas');
            canvasOculto.width = 1280;
            canvasOculto.height = 960;
            const ctx = canvasOculto.getContext('2d');
            ctx.drawImage(video, 0, 0, canvasOculto.width, canvasOculto.height);
            fotosMemoria.push(canvasOculto);
        }

        function finalizarECaptonarAmbiente() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            document.getElementById('tela-captura').classList.remove('active');
            document.getElementById('tela-exportacao').classList.add('active');
            renderizarTexturaFinal();
        }

        function renderizarTexturaFinal() {
            const ctx = canvasFinal.getContext('2d');
            canvasFinal.width = 4096;
            canvasFinal.height = 2048;

            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvasFinal.width, canvasFinal.height);

            let colunas = 6;
            let larguraSlot = canvasFinal.width / colunas;
            let alturaSlot = canvasFinal.height / 4;

            fotosMemoria.forEach((img, index) => {
                let x, y;

                if (index < 6) { 
                    x = index * larguraSlot;
                    y = 0;
                } else if (index >= 6 && index < 16) { 
                    let idxH = index - 6;
                    x = (idxH % colunas) * larguraSlot;
                    y = alturaSlot + (Math.floor(idxH / colunas) * alturaSlot);
                } else { 
                    let idxC = index - 16;
                    x = idxC * larguraSlot;
                    y = alturaSlot * 3;
                }

                ctx.drawImage(img, x, y, larguraSlot, alturaSlot);
            });
        }

        function baixarArquivoQuest() {
            const link = document.createElement('a');
            link.download = 'panorama_estabilizado_vr.jpg';
            link.href = canvasFinal.toDataURL('image/jpeg', 0.85);
            link.click();
        }
    </script>
</body>
</html>
