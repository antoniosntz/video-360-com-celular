<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teleport 360 - Captura Forçada</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            background-color: #121212;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .screen {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .screen.active {
            display: block;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
        }

        .painel-topo {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 25px;
            text-align: center;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.1);
            width: 90%;
            max-width: 400px;
        }

        .painel-topo h2 { font-size: 22px; margin-bottom: 5px; color: #00ffcc; }
        .painel-topo p { font-size: 13px; color: #ddd; }

        #timer-display {
            font-size: 18px;
            font-weight: bold;
            color: #ffcc00;
            margin-top: 5px;
            display: none;
        }

        /* Retículo da Mira Central */
        .mira-central {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 65px;
            height: 65px;
            border: 4px dashed #ff0055;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            transition: transform 0.1s;
        }
        
        .mira-central.alinhada {
            border: 4px solid #ffcc00;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
        }

        .mira-central.capturando {
            border-color: #00ffcc; 
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.9);
            transform: translate(-50%, -50%) scale(1.1);
        }

        .mira-central::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: currentColor;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        #espaco-pontos {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 6;
        }

        .bolinha-guia {
            position: absolute;
            width: 35px;
            height: 35px;
            background: rgba(255, 0, 85, 0.7);
            border: 3px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none;
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
        }

        .bolinha-guia.capturada {
            background: #00ffcc !important;
            transform: translate(-50%, -50%) scale(0.6);
            opacity: 0.3;
        }

        #btn-permissao {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 18px 36px;
            background: #00ffcc;
            color: #000;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            z-index: 20;
            box-shadow: 0 10px 30px rgba(0,255,204,0.4);
        }

        /* Tela de Exportação */
        #tela-exportacao {
            background: #1a1a1a;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
        }

        #tela-exportacao.active { display: flex; }

        .preview-canvas {
            max-width: 90%;
            max-height: 40vh;
            border: 2px solid #333;
            margin: 20px 0;
            background: #000;
        }

        .btn-salvar {
            background: #00ffcc;
            color: #000;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="tela-captura" class="screen active">
        <video id="webcam" autoplay playsinline muted></video>
        <div class="mira-central" id="mira"></div>
        <div id="espaco-pontos"></div>

        <div class="hud">
            <div class="painel-topo">
                <h2 id="contador">Progresso: 0%</h2>
                <p id="instrucao">Aguardando inicialização...</p>
                <div id="timer-display">Ajustando...</div>
                <p id="debug" style="font-size: 11px; color: #ff0055; margin-top: 5px; font-family: monospace; font-weight: bold;">Mova o celular para testar os eixos</p>
            </div>
            <button id="btn-permissao" onclick="inicializarApp()">ATIVAR CÂMERA E BÚSSOLA</button>
        </div>
    </div>

    <div id="tela-exportacao" class="screen">
        <h2>Captura Concluída!</h2>
        <p style="color: #aaa; margin-top: 10px;">O Atlas de Texturas para VR foi gerado.</p>
        <canvas id="canvas-final" class="preview-canvas"></canvas>
        <button class="btn-salvar" onclick="baixarArquivoQuest()">Salvar Arquivo para Meta Quest</button>
    </div>

    <script>
        const espacoPontos = document.getElementById('espaco-pontos');
        const contadorTxt = document.getElementById('contador');
        const instrucaoTxt = document.getElementById('instrucao');
        const timerDisplay = document.getElementById('timer-display');
        const debugTxt = document.getElementById('debug');
        const btnPermissao = document.getElementById('btn-permissao');
        const mira = document.getElementById('mira');
        const video = document.getElementById('webcam');
        const canvasFinal = document.getElementById('canvas-final');

        let fotosCapturadas = 0;
        let listaPontos = [];
        let fotosMemoria = [];

        let pontoSendoFocado = null;
        let timerFoco = null;

        // Gerador Automático de Camadas Simplificado para evitar quebras de sensores de marcas específicas
        // Alvos recalculados para uma experiência mais abrangente e fácil de capturar
        const configuracaoCamadas = [
            { tipo: 'teto', inclina: 40, quantidade: 6 },
            { tipo: 'horizonte', inclina: 0, quantidade: 10 },
            { tipo: 'chao', inclina: -40, quantidade: 6 }
        ];
        
        let totalFotosEsperadas = 22;

        function gerarGradePontos() {
            espacoPontos.innerHTML = '';
            listaPontos = [];
            
            configuracaoCamadas.forEach(camada => {
                for (let i = 0; i < camada.quantidade; i++) {
                    let anguloBussolaAlvo = (360 / camada.quantidade) * i;
                    
                    const div = document.createElement('div');
                    div.className = 'bolinha-guia';
                    espacoPontos.appendChild(div);

                    listaPontos.push({
                        id: listaPontos.length,
                        alvoYaw: anguloBussolaAlvo, 
                        alvoPitch: camada.inclina,
                        capturado: false,
                        element: div
                    });
                }
            });
        }

        async function iniciarCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Erro ao abrir câmera. Verifique se o site possui permissão de HTTPS.");
            }
        }

        function inicializarApp() {
            instrucaoTxt.innerText = "Busque as bolinhas vermelhas girando o aparelho";
            
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(response => {
                    if (response === 'granted') {
                        window.addEventListener('deviceorientation', processarMovimento, true);
                        btnPermissao.style.display = 'none';
                    }
                }).catch(err => alert("Erro ao solicitar sensores no iOS: " + err));
            } else {
                if ('ondeviceorientationabsolute' in window) {
                    window.addEventListener('deviceorientationabsolute', processarMovimento, true);
                } else {
                    window.addEventListener('deviceorientation', processarMovimento, true);
                }
                btnPermissao.style.display = 'none';
            }
            iniciarCamera();
            gerarGradePontos();
        }

        function processarMovimento(event) {
            // Unificação forçada de bússolas e giroscópios adaptativos
            let grauBussola = event.webkitCompassHeading !== undefined ? event.webkitCompassHeading : (360 - event.alpha); 
            let pitchCelular = event.pitch !== undefined ? event.pitch : event.beta; 

            if (grauBussola === undefined || pitchCelular === null) {
                debugTxt.innerText = "Erro: Hardware sem suporte magnético.";
                return;
            }
            
            if (grauBussola >= 360) grauBussola -= 360;
            if (grauBussola < 0) grauBussola += 360;

            // Normaliza o Pitch do celular para sistemas híbridos (Garante leitura estável se está olhando para cima ou baixo)
            if (pitchCelular > 180) pitchCelular -= 360;

            debugTxt.innerText = `ANG: ${Math.round(grauBussola)}° | INC: ${Math.round(pitchCelular)}°`;

            const larguraTela = window.innerWidth;
            const alturaTela = window.innerHeight;
            
            // Sensibilidade expandida para renderizar os pontos rapidamente na tela do celular
            const sensibilidadeX = larguraTela / 60; 
            const sensibilidadeY = alturaTela / 60; 

            let algumAlvoAlinhado = false;
            let pontoAlinhadoAtual = null;

            listaPontos.forEach(ponto => {
                if (ponto.capturado) return;

                let diffX = ponto.alvoYaw - grauBussola;
                let diffY = pitchCelular - ponto.alvoPitch;

                // Força rotação esférica horizontal infinita
                if (diffX > 180) diffX -= 360;
                if (diffX < -180) diffX += 360;

                let posX = (larguraTela / 2) + (diffX * sensibilidadeX);
                let posY = (alturaTela / 2) + (diffY * sensibilidadeY);

                // Mostra as bolinhas se estiverem minimamente próximas do campo de visão útil da tela
                if (posX > -50 && posX < larguraTela + 50 && posY > -50 && posY < alturaTela + 50) {
                    ponto.element.style.display = 'block';
                    ponto.element.style.left = `${posX}px`;
                    ponto.element.style.top = `${posY}px`;
                } else {
                    ponto.element.style.display = 'none';
                }

                // Cálculo de distância na tela baseado em pixels, livre de travas físicas do sensor
                let distPixelsMesa = Math.sqrt(Math.pow(posX - (larguraTela/2), 2) + Math.pow(posY - (alturaTela/2), 2));

                // Margem generosa de colisão: 45 pixels ao redor da mira central
                if (distPixelsMesa < 45) {
                    algumAlvoAlinhado = true;
                    pontoAlinhadoAtual = ponto;
                }
            });

            // Disparador de Captura Ultra Veloz: 0.3 segundos imóvel (300ms)
            if (algumAlvoAlinhado && pontoAlinhadoAtual) {
                if (pontoSendoFocado !== pontoAlinhadoAtual.id) {
                    resetarTimerFoco();
                    pontoSendoFocado = pontoAlinhadoAtual.id;
                    
                    mira.className = "mira-central alinhada";
                    timerDisplay.style.display = "block";
                    timerDisplay.innerText = "Capturando...";

                    timerFoco = setTimeout(() => {
                        executarCapturaDeFoto(pontoAlinhadoAtual);
                    }, 300); // 300ms = Praticamente instantâneo ao focar
                }
            } else {
                resetarTimerFoco();
            }
        }

        function resetarTimerFoco() {
            if (timerFoco) {
                clearTimeout(timerFoco);
                timerFoco = null;
            }
            pontoSendoFocado = null;
            mira.className = "mira-central";
            timerDisplay.style.display = "none";
        }

        function executarCapturaDeFoto(ponto) {
            resetarTimerFoco();
            
            ponto.capturado = true;
            ponto.element.classList.add('capturada');
            ponto.element.style.display = 'none'; // Some após tirar para limpar o visual
            
            mira.classList.add('capturando');
            setTimeout(() => mira.classList.remove('capturando'), 100);

            salvarFrameNaMemoria();
            fotosCapturadas++;
            
            let porcentagem = Math.round((fotosCapturadas / totalFotosEsperadas) * 100);
            contadorTxt.innerText = `Progresso: ${porcentagem}%`;

            if (navigator.vibrate) navigator.vibrate(60);

            if (fotosCapturadas === totalFotosEsperadas) {
                finalizarECaptonarAmbiente();
            }
        }

        function salvarFrameNaMemoria() {
            const canvasOculto = document.createElement('canvas');
            canvasOculto.width = 640;
            canvasOculto.height = 480;
            const ctx = canvasOculto.getContext('2d');
            ctx.drawImage(video, 0, 0, canvasOculto.width, canvasOculto.height);
            fotosMemoria.push(canvasOculto);
        }

        function finalizarECaptonarAmbiente() {
            window.removeEventListener('deviceorientation', processarMovimento);
            window.removeEventListener('deviceorientationabsolute', processarMovimento);
            
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            document.getElementById('tela-captura').classList.remove('active');
            document.getElementById('tela-exportacao').classList.add('active');

            renderizarTexturaFinal();
        }

        function renderizarTexturaFinal() {
            const ctx = canvasFinal.getContext('2d');
            canvasFinal.width = 2048;
            canvasFinal.height = 1536;

            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvasFinal.width, canvasFinal.height);

            let colunas = 6;
            let larguraSlot = canvasFinal.width / colunas;
            let alturaSlot = canvasFinal.height / 4;

            fotosMemoria.forEach((img, index) => {
                let x = (index % colunas) * larguraSlot;
                let y = Math.floor(index / colunas) * alturaSlot;
                ctx.drawImage(img, x, y, larguraSlot, alturaSlot);
            });
        }

        function baixarArquivoQuest() {
            const link = document.createElement('a');
            link.download = 'panorama_esferico_meta_quest.jpg';
            link.href = canvasFinal.toDataURL('image/jpeg', 0.9);
            link.click();
        }
    </script>
</body>
</html>
