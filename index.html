<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleport 360 Clone - Captura Horizontal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #camera-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
        }

        .painel-topo {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 25px;
            text-align: center;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Linha guia do horizonte (estilo nível de bolha do Teleport) */
        .linha-horizonte {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            pointer-events: none;
            z-index: 4;
        }

        /* Mira central estável */
        .mira-central {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            border: 2px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            transition: border-color 0.2s;
        }
        
        .mira-central.alinhada {
            border-color: #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
        }

        /* Faixa horizontal por onde as bolinhas vão passar */
        #faixa-giro {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 0;
            pointer-events: none;
            z-index: 6;
        }

        .bolinha-guia {
            position: absolute;
            width: 30px;
            height: 30px;
            background: rgba(255, 0, 128, 0.6);
            border: 3px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .bolinha-guia.capturada {
            background: #00ffcc !important;
            border-color: #ffffff !important;
            transform: translate(-50%, -50%) scale(0.8);
            opacity: 0.5;
        }

        #btn-permissao {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 18px 36px;
            background: #ffffff;
            color: #000;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            z-index: 20;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="camera-container">
        <video id="webcam" autoplay playsinline muted></video>
        
        <div class="linha-horizonte"></div>
        <div class="mira-central" id="mira"></div>

        <div id="faixa-giro"></div>

        <div class="hud">
            <div class="painel-topo">
                <h2 id="contador">Progresso: 0%</h2>
                <p id="instrucao">Gire o corpo devagar mantendo o celular reto</p>
                <p id="debug" style="font-size: 11px; color: #888; margin-top: 5px;">Aguardando sensores...</p>
            </div>
            
            <button id="btn-permissao" onclick="inicializarApp()">Iniciar Captura 360°</button>
        </div>
    </div>

    <script>
        const faixaGiro = document.getElementById('faixa-giro');
        const contadorTxt = document.getElementById('contador');
        const debugTxt = document.getElementById('debug');
        const btnPermissao = document.getElementById('btn-permissao');
        const mira = document.getElementById('mira');
        const video = document.getElementById('webcam');

        let fotosCapturadas = 0;
        let listaPontos = [];
        let primeiroAlpha = null; // Armazena o norte inicial do usuário ao começar
        
        // Estilo Teleport: Apenas 14 fotos na horizontal para fechar os 360° perfeitamente
        const totalFotos = 14; 

        function gerarGradePontos() {
            faixaGiro.innerHTML = '';
            listaPontos = [];
            
            for (let i = 0; i < totalFotos; i++) {
                // Calcula o ângulo alvo para cada uma das 14 fotos (de 0° a 360°)
                let anguloAlvo = (360 / totalFotos) * i;
                
                const div = document.createElement('div');
                div.className = 'bolinha-guia';
                faixaGiro.appendChild(div);

                listaPontos.push({
                    id: i,
                    alvoYaw: anguloAlvo, 
                    capturado: false,
                    element: div
                });
            }
        }

        async function iniciarCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Permita o acesso à câmera traseira.");
            }
        }

        function inicializarApp() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            window.addEventListener('deviceorientation', processarMovimento, true);
                            btnPermissao.style.display = 'none';
                        }
                    }).catch(console.error);
            } else {
                window.addEventListener('deviceorientation', processarMovimento, true);
                btnPermissao.style.display = 'none';
            }
            iniciarCamera();
            gerarGradePontos();
        }

        function processarMovimento(event) {
            let alpha = event.alpha; // Rotação horizontal (0 a 360)
            let beta = event.beta;   // Inclinação vertical (celular em pé fica perto de 70-90)

            // Define o ponto zero baseado em para onde o usuário estava olhando ao clicar no botão
            if (primeiroAlpha === null) {
                primeiroAlpha = alpha;
            }

            // Calcula o Yaw (giro atual) relativo ao ponto inicial
            let yawAtual = alpha - primeiroAlpha;
            if (yawAtual < 0) yawAtual += 360;

            // O Teleport exige que o celular fique reto na vertical. 
            // Vamos monitorar se o celular está muito inclinado para cima ou para baixo (Tolerância ideal)
            let inclinaCorreta = (beta > 70 && beta < 110); 
            
            if (inclinaCorreta) {
                mira.classList.add('alinhada');
            } else {
                mira.classList.remove('alinhada');
            }

            debugTxt.innerText = `Giro Atual: ${Math.round(yawAtual)}° | Inclinação: ${Math.round(beta)}°`;

            const larguraTela = window.innerWidth;
            // Sensibilidade de quantos pixels a bolinha corre na tela por grau de movimento
            const sensibilidadeX = larguraTela / 50; 

            listaPontos.forEach(ponto => {
                // Calcula a distância do ponto para a mira do usuário
                let diffX = ponto.alvoYaw - yawAtual;

                // Ajuste para loop infinito dos 360°
                if (diffX > 180) diffX -= 360;
                if (diffX < -180) diffX += 360;

                // Posiciona a bolinha na faixa horizontal central da tela
                let posX = (larguraTela / 2) + (diffX * sensibilidadeX);

                // Só exibe a bolinha se ela estiver visível na tela horizontalmente
                if (posX > -50 && posX < larguraTela + 50) {
                    ponto.element.style.display = 'block';
                    ponto.element.style.left = `${posX}px`;
                } else {
                    ponto.element.style.display = 'none';
                }

                // LÓGICA DE CAPTURA (Se passar em cima da bolinha mantendo o celular reto)
                if (!ponto.capturado && inclinaCorreta && Math.abs(posX - (larguraTela / 2)) < 15) {
                    ponto.capturado = true;
                    ponto.element.classList.add('capturada');
                    
                    fotosCapturadas++;
                    let porcentagem = Math.round((fotosCapturadas / totalFotos) * 100);
                    contadorTxt.innerText = `Progresso: ${porcentagem}%`;

                    if (navigator.vibrate) navigator.vibrate(80); // Vibração curta de confirmação

                    if (fotosCapturadas === totalFotos) {
                        document.getElementById('instrucao').innerText = "Captura Completa! Processando panorama...";
                        alert("Sucesso! Panorama horizontal de 14 fotos concluído no estilo Teleport.");
                    }
                }
            });
        }
    </script>
</body>
</html>
