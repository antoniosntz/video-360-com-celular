<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teleport 360 - Bússola Digital</title>
    <style>
        /* Reset de Estilos Mobile */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #camera-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* Renderização da Câmera do Celular */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Interface HUD */
        .hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
        }

        .painel-topo {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 25px;
            text-align: center;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.1);
            width: 90%;
            max-width: 400px;
        }

        .painel-topo h2 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #00ffcc;
        }

        .painel-topo p {
            font-size: 14px;
            color: #ddd;
        }

        /* Nível do Horizonte Estilo Teleport */
        .linha-horizonte {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.25);
            pointer-events: none;
            z-index: 4;
        }

        /* Retículo da Mira Central */
        .mira-central {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            border: 3px solid #ff0055;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        /* Ativado quando o nível vertical está reto */
        .mira-central.alinhada {
            border-color: #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
        }

        .mira-central::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: currentColor;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* Trilho Invisível da Bússola */
        #faixa-giro {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 0;
            pointer-events: none;
            z-index: 6;
        }

        /* Alvos Fixos no Espaço Magnético */
        .bolinha-guia {
            position: absolute;
            width: 32px;
            height: 32px;
            background: rgba(255, 0, 85, 0.6);
            border: 3px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            display: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.1s, background-color 0.2s;
        }

        /* Alvo capturado com sucesso */
        .bolinha-guia.capturada {
            background: #00ffcc !important;
            border-color: #ffffff !important;
            transform: translate(-50%, -50%) scale(0.7);
            opacity: 0.4;
        }

        /* Botão para Ativação de Sensores */
        #btn-permissao {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 18px 36px;
            background: #ffffff;
            color: #000;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="camera-container">
        <video id="webcam" autoplay playsinline muted></video>
        
        <div class="linha-horizonte"></div>
        <div class="mira-central" id="mira"></div>
        <div id="faixa-giro"></div>

        <div class="hud">
            <div class="painel-topo">
                <h2 id="contador">Progresso: 0%</h2>
                <p id="instrucao">Clique no botão para iniciar</p>
                <p id="debug" style="font-size: 11px; color: #888; margin-top: 5px; font-family: monospace;">Aguardando Calibração...</p>
            </div>
            
            <button id="btn-permissao" onclick="inicializarApp()">Iniciar Captura 360°</button>
        </div>
    </div>

    <script>
        const faixaGiro = document.getElementById('faixa-giro');
        const contadorTxt = document.getElementById('contador');
        const instrucaoTxt = document.getElementById('instrucao');
        const debugTxt = document.getElementById('debug');
        const btnPermissao = document.getElementById('btn-permissao');
        const mira = document.getElementById('mira');
        const video = document.getElementById('webcam');

        let fotosCapturadas = 0;
        let listaPontos = [];
        
        // Definição: 14 fotos distribuídas igualmente pelos 360 graus geográficos
        const totalFotos = 14; 

        function gerarGradePontos() {
            faixaGiro.innerHTML = '';
            listaPontos = [];
            
            for (let i = 0; i < totalFotos; i++) {
                // Posiciona cada bolinha em uma coordenada magnética absoluta do planeta
                let anguloAlvo = (360 / totalFotos) * i;
                
                const div = document.createElement('div');
                div.className = 'bolinha-guia';
                faixaGiro.appendChild(div);

                listaPontos.push({
                    id: i,
                    alvoYaw: anguloAlvo, 
                    capturado: false,
                    element: div
                });
            }
        }

        async function iniciarCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Por favor, conceda acesso à câmera nas configurações do seu navegador.");
            }
        }

        function inicializarApp() {
            instrucaoTxt.innerText = "Gire o corpo procurando as bolinhas fixas no espaço";
            
            // Tratamento de segurança para iOS (Safari)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            window.addEventListener('deviceorientation', processarMovimento, true);
                            btnPermissao.style.display = 'none';
                        }
                    }).catch(console.error);
            } else {
                // Tratamento específico para Android (Força o uso do magnetômetro absoluto terrestre)
                if ('ondeviceorientationabsolute' in window) {
                    window.addEventListener('deviceorientationabsolute', processarMovimento, true);
                } else {
                    window.addEventListener('deviceorientation', processarMovimento, true);
                }
                btnPermissao.style.display = 'none';
            }
            iniciarCamera();
            gerarGradePontos();
        }

        function processarMovimento(event) {
            let grauBussola = 0;

            // Extração de dados puros do hardware magnético (Bússola)
            if (event.webkitCompassHeading !== undefined) {
                // iOS nativo (0 = Norte Geográfico)
                grauBussola = event.webkitCompassHeading;
            } else if (event.absolute === true || event.alpha !== null) {
                // Android nativo absoluto (Ajustado para rotação horária padrão de bússolas)
                grauBussola = 360 - event.alpha;
            } else {
                return; // Dispositivo sem magnetômetro
            }

            let beta = event.beta; // Inclinação vertical (Nível)

            // Tratamento matemático de limite esférico
            if (grauBussola >= 360) grauBussola -= 360;
            if (grauBussola < 0) grauBussola += 360;

            // Validação de Nível: O celular precisa estar em pé (beta próximo a 90°)
            let inclinaCorreta = (beta > 75 && beta < 105); 
            
            if (inclinaCorreta) {
                mira.classList.add('alinhada');
            } else {
                mira.classList.remove('alinhada');
            }

            debugTxt.innerText = `BÚSSOLA GEOGRÁFICA: ${Math.round(grauBussola)}° | Nível: ${Math.round(beta)}°`;

            const larguraTela = window.innerWidth;
            const sensibilidadeX = larguraTela / 45; // Escala do movimento das bolinhas na tela

            listaPontos.forEach(ponto => {
                // Distância angular exata entre a bússola atual e o alvo geográfico
                let diffX = ponto.alvoYaw - grauBussola;

                // Correção de rotação contínua (muda suavemente de 359° para 0°)
                if (diffX > 180) diffX -= 360;
                if (diffX < -180) diffX += 360;

                let posX = (larguraTela / 2) + (diffX * sensibilidadeX);

                // Otimização de renderização (Surgem na tela conforme você vira o aparelho para elas)
                if (posX > -50 && posX < larguraTela + 50) {
                    ponto.element.style.display = 'block';
                    ponto.element.style.left = `${posX}px`;
                } else {
                    ponto.element.style.display = 'none';
                }

                // GATILHO: Se a bússola bater com a coordenada alvo com o nível reto, registra a foto
                if (!ponto.capturado && inclinaCorreta && Math.abs(posX - (larguraTela / 2)) < 12) {
                    ponto.capturado = true;
                    ponto.element.classList.add('capturada');
                    
                    fotosCapturadas++;
                    let porcentagem = Math.round((fotosCapturadas / totalFotos) * 100);
                    contadorTxt.innerText = `Progresso: ${porcentagem}%`;

                    if (navigator.vibrate) navigator.vibrate(80); // Feedback físico de clique

                    if (fotosCapturadas === totalFotos) {
                        instrucaoTxt.innerText = "Captura completa de 360°!";
                        alert("Sucesso! O sistema sincronizou as 14 posições usando a bússola magnética.");
                    }
                }
            });
        }
    </script>
</body>
</html>
