<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Teleport 360 - Visualizador VR</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #seletor-arquivo {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-family: sans-serif;
            border: 1px solid #333;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="seletor-arquivo">
        <label for="upload">Carregue seu Panorama (.jpg): </label>
        <input type="file" id="upload" accept="image/*">
    </div>

    <script>
        let cena, camera, renderizador, esfera;
        let txtCarregada;

        // Inicializa o Motor 3D
        function init() {
            // 1. Criar a Cena
            cena = new THREE.Scene();

            // 2. Criar a Câmera (Posicionada bem no centro da esfera, onde o usuário vai olhar)
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 0);

            // 3. Criar o Renderizador com suporte a VR (WebXR)
            renderizador = new THREE.WebGLRenderer({ antialias: true });
            renderizador.setSize(window.innerWidth, window.innerHeight);
            renderizador.xr.enabled = true; // Ativa modo VR para o Meta Quest
            document.body.appendChild(renderizador.domElement);

            // Adiciona o botão oficial do Google/Three para entrar em modo VR nos óculos
            import('https://unpkg.com/three@0.128.0/examples/jsm/webxr/VRButton.js').then((module) => {
                document.body.appendChild(module.VRButton.createButton(renderizador));
            });

            // 4. Criar a Geometria da Esfera
            // Usamos escalas negativas para inverter as faces da esfera para o lado de DENTRO
            const geometria = new THREE.SphereGeometry(500, 60, 40);
            geometria.scale(-1, 1, 1); 

            // Material padrão inicial preto enquanto a foto não carrega
            const material = new THREE.MeshBasicMaterial({ color: 0x111111 });
            esfera = new THREE.Mesh(geometria, material);
            cena.add(esfera);

            // Ouvintes de redimensionamento e toque para arrastar a tela no celular
            window.addEventListener('resize', noRedimensionamento);
            configurarControlesToque();

            // Loop de renderização contínuo
            renderizador.setAnimationLoop(renderizar);
        }

        // Lógica de leitura do arquivo gerado
        document.getElementById('upload').addEventListener('change', function(e) {
            const arquivo = e.target.files[0];
            if (!arquivo) return;

            const leitor = new FileReader();
            leitor.onload = function(evento) {
                const gerenciadorTextura = new THREE.TextureLoader();
                gerenciadorTextura.load(evento.target.result, function(textura) {
                    // Configurações para garantir nitidez máxima no Meta Quest
                    textura.minFilter = THREE.LinearFilter;
                    textura.generateMipmaps = false;
                    
                    // Aplica a imagem na parede interna da esfera
                    esfera.material = new THREE.MeshBasicMaterial({ map: textura });
                    document.getElementById('seletor-arquivo').style.display = 'none';
                });
            };
            leitor.readAsDataURL(arquivo);
        });

        // Controles de arrastar o dedo (para testar no computador ou celular sem óculos VR)
        let focado = false, noMouseX = 0, noMouseY = 0, lon = 0, lat = 0;

        function configurarControlesToque() {
            document.addEventListener('mousedown', (e) => { focado = true; noMouseX = e.clientX; noMouseY = e.clientY; });
            document.addEventListener('mousemove', (e) => {
                if (focado) {
                    lon -= (e.clientX - noMouseX) * 0.1;
                    lat += (e.clientY - noMouseY) * 0.1;
                    noMouseX = e.clientX; noMouseY = e.clientY;
                }
            });
            document.addEventListener('mouseup', () => focado = false);
            
            // Suporte para Touch (Celular)
            document.addEventListener('touchstart', (e) => { focado = true; noMouseX = e.touches[0].clientX; noMouseY = e.touches[0].clientY; });
            document.addEventListener('touchmove', (e) => {
                if (focado) {
                    lon -= (e.touches[0].clientX - noMouseX) * 0.15;
                    lat += (e.touches[0].clientY - noMouseY) * 0.15;
                    noMouseX = e.touches[0].clientX; noMouseY = e.touches[0].clientY;
                }
            });
            document.addEventListener('touchend', () => focado = false);
        }

        function renderizar() {
            // Se o usuário não estiver em VR, roda o controle manual de rotação por toque/mouse
            if (!renderizador.xr.isPresenting) {
                lat = Math.max(-85, Math.min(85, lat));
                const phi = THREE.MathUtils.degToRad(90 - lat);
                const theta = THREE.MathUtils.degToRad(lon);

                const alvo = new THREE.Vector3();
                alvo.x = 500 * Math.sin(phi) * Math.sin(theta);
                alvo.y = 500 * Math.cos(phi);
                alvo.z = 500 * Math.sin(phi) * Math.cos(theta);

                camera.lookAt(alvo);
            }
            renderizador.render(cena, camera);
        }

        function noRedimensionamento() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderizador.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
